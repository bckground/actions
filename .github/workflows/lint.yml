---
name: "lint"

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  actionlint:
    name: "actionlint"
    runs-on: "blacksmith-2vcpu-ubuntu-2404-arm"
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0

      # Use mise-action directly (not our setup-mise) so linting still runs even
      # when the repository's own composite actions are broken.
      - uses: "jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d" # v4.2.0
        with:
          install: true
          cache: false
          experimental: true

      - name: "Run actionlint"
        run: |
          actionlint -color

      - name: "Run shellcheck"
        run: |
          shellcheck cache-go/internal/*.sh
