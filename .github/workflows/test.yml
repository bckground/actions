---
name: "test"

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  preflight:
    name: "preflight"
    runs-on: "blacksmith-2vcpu-ubuntu-2404-arm"
    outputs:
      setup_mise_backends: "${{ steps.set.outputs.setup_mise_backends }}"
      cache_go_backends: "${{ steps.set.outputs.cache_go_backends }}"
    steps:
      # The s3 backend needs OVH secrets, which are unavailable on fork PRs.
      # Only include s3 in the matrices when the secret is present.
      - name: "Determine testable backends"
        id: "set"
        shell: "bash"
        env:
          S3_BUCKET: "${{ secrets.OVH_GHA_CACHE_BUCKET_NAME }}"
        run: |
          if [ -n "$S3_BUCKET" ]; then
            echo 'setup_mise_backends=["none","github","s3"]' | tee -a "$GITHUB_OUTPUT"
            echo 'cache_go_backends=["github","s3"]' | tee -a "$GITHUB_OUTPUT"
          else
            echo 'setup_mise_backends=["none","github"]' | tee -a "$GITHUB_OUTPUT"
            echo 'cache_go_backends=["github"]' | tee -a "$GITHUB_OUTPUT"
          fi

  guard:
    name: "validation guard"
    runs-on: "blacksmith-2vcpu-ubuntu-2404-arm"
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0

      - name: "Reject invalid cache-backend"
        id: "invalid-backend"
        continue-on-error: true
        uses: "./setup-mise"
        with:
          cache-backend: "bogus"

      - name: "Reject s3 without credentials"
        id: "s3-no-credentials"
        continue-on-error: true
        uses: "./setup-mise"
        with:
          cache-backend: "s3"

      - name: "cache-go rejects none"
        id: "cachego-none"
        continue-on-error: true
        uses: "./cache-go/restore"
        with:
          cache-backend: "none"

      - name: "Assert guard behavior"
        shell: "bash"
        env:
          INVALID_BACKEND_OUTCOME: "${{ steps.invalid-backend.outcome }}"
          S3_NO_CREDENTIALS_OUTCOME: "${{ steps.s3-no-credentials.outcome }}"
          CACHEGO_NONE_OUTCOME: "${{ steps.cachego-none.outcome }}"
        run: |
          fail=0
          if [ "$INVALID_BACKEND_OUTCOME" != "failure" ]; then
            echo "::error::invalid cache-backend should fail (got '$INVALID_BACKEND_OUTCOME')"
            fail=1
          fi
          if [ "$S3_NO_CREDENTIALS_OUTCOME" != "failure" ]; then
            echo "::error::s3 without credentials should fail (got '$S3_NO_CREDENTIALS_OUTCOME')"
            fail=1
          fi
          if [ "$CACHEGO_NONE_OUTCOME" != "failure" ]; then
            echo "::error::cache-go should reject cache-backend 'none' (got '$CACHEGO_NONE_OUTCOME')"
            fail=1
          fi
          exit "$fail"

  setup-mise:
    name: "setup-mise (${{ matrix.backend }})"
    needs: "preflight"
    runs-on: "blacksmith-2vcpu-ubuntu-2404-arm"
    strategy:
      fail-fast: false
      matrix:
        backend: "${{ fromJSON(needs.preflight.outputs.setup_mise_backends) }}"
    env:
      S3_CREDENTIALS: >-
        ${{ format('{{"endpoint": "{0}", "access_key": "{1}", "secret_key": "{2}", "bucket_name": "{3}"}}',
        secrets.OVH_GHA_CACHE_ENDPOINT, vars.OVH_GHA_CACHE_USER_SECRET_ID, secrets.OVH_GHA_CACHE_USER_SECRET, secrets.OVH_GHA_CACHE_BUCKET_NAME) }}
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0

      - name: "Set up mise"
        uses: "./setup-mise"
        with:
          cache-backend: "${{ matrix.backend }}"
          s3-credentials: "${{ matrix.backend == 's3' && env.S3_CREDENTIALS || '' }}"

      - name: "Assert tools are available"
        run: |
          prettier --version

  cache-go:
    name: "cache-go (${{ matrix.backend }})"
    needs: "preflight"
    runs-on: "blacksmith-2vcpu-ubuntu-2404-arm"
    strategy:
      fail-fast: false
      matrix:
        backend: "${{ fromJSON(needs.preflight.outputs.cache_go_backends) }}"
    env:
      S3_CREDENTIALS: >-
        ${{ format('{{"endpoint": "{0}", "access_key": "{1}", "secret_key": "{2}", "bucket_name": "{3}"}}',
        secrets.OVH_GHA_CACHE_ENDPOINT, vars.OVH_GHA_CACHE_USER_SECRET_ID, secrets.OVH_GHA_CACHE_USER_SECRET, secrets.OVH_GHA_CACHE_BUCKET_NAME) }}
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0

      - uses: "actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16" # v6.5.0
        with:
          go-version: "1.24"
          cache: false

      - name: "Populate go caches"
        working-directory: "_test/fixtures/go"
        run: |
          go mod download
          go build -o /dev/null .

      - name: "Save go caches"
        uses: "./cache-go/save"
        with:
          cache-backend: "${{ matrix.backend }}"
          s3-credentials: "${{ matrix.backend == 's3' && env.S3_CREDENTIALS || '' }}"
          name: "ci-cache-go-test"
          dependency-path: "_test/fixtures/go/go.sum"

      - name: "Restore go caches"
        id: "restore"
        uses: "./cache-go/restore"
        with:
          cache-backend: "${{ matrix.backend }}"
          s3-credentials: "${{ matrix.backend == 's3' && env.S3_CREDENTIALS || '' }}"
          name: "ci-cache-go-test"
          dependency-path: "_test/fixtures/go/go.sum"

      - name: "Assert cache hit"
        shell: "bash"
        env:
          BACKEND: "${{ matrix.backend }}"
          CACHE_HIT: "${{ steps.restore.outputs.cache-hit }}"
          CACHE_MATCH: "${{ steps.restore.outputs.cache-match }}"
        run: |
          if [ "$CACHE_HIT" != "true" ]; then
            echo "::error::expected cache-hit=true for backend '$BACKEND', got '$CACHE_HIT'"
            exit 1
          fi
          if [ "$CACHE_MATCH" != "exact" ]; then
            echo "::error::expected cache-match=exact for backend '$BACKEND', got '$CACHE_MATCH'"
            exit 1
          fi

      - name: "Restore a never-saved key"
        id: "restore-miss"
        uses: "./cache-go/restore"
        with:
          cache-backend: "${{ matrix.backend }}"
          s3-credentials: "${{ matrix.backend == 's3' && env.S3_CREDENTIALS || '' }}"
          name: "ci-cache-go-miss-${{ github.run_id }}-${{ github.run_attempt }}"
          dependency-path: "_test/fixtures/go/go.sum"

      - name: "Assert cache miss reports 'false', not empty"
        shell: "bash"
        env:
          BACKEND: "${{ matrix.backend }}"
          CACHE_HIT: "${{ steps.restore-miss.outputs.cache-hit }}"
          CACHE_MATCH: "${{ steps.restore-miss.outputs.cache-match }}"
        run: |
          if [ "$CACHE_HIT" != "false" ]; then
            echo "::error::expected cache-hit=false on a miss for backend '$BACKEND', got '$CACHE_HIT'"
            exit 1
          fi
          if [ "$CACHE_MATCH" != "none" ]; then
            echo "::error::expected cache-match=none on a miss for backend '$BACKEND', got '$CACHE_MATCH'"
            exit 1
          fi

      - name: "Restore with a different dependency hash"
        id: "restore-partial"
        uses: "./cache-go/restore"
        with:
          cache-backend: "${{ matrix.backend }}"
          s3-credentials: "${{ matrix.backend == 's3' && env.S3_CREDENTIALS || '' }}"
          name: "ci-cache-go-test"
          dependency-path: "_test/fixtures/go/go.mod"

      - name: "Assert restore-key (partial) match"
        shell: "bash"
        env:
          BACKEND: "${{ matrix.backend }}"
          CACHE_HIT: "${{ steps.restore-partial.outputs.cache-hit }}"
          CACHE_MATCH: "${{ steps.restore-partial.outputs.cache-match }}"
        run: |
          if [ "$CACHE_HIT" != "false" ]; then
            echo "::error::expected cache-hit=false on a partial match for backend '$BACKEND', got '$CACHE_HIT'"
            exit 1
          fi
          if [ "$CACHE_MATCH" != "partial" ]; then
            echo "::error::expected cache-match=partial for backend '$BACKEND', got '$CACHE_MATCH'"
            exit 1
          fi
