---
name: "cache-go - restore"

inputs:
  s3_credentials:
    description: |
      The S3 credentials as a JSON object. Must contain the following keys:

      - endpoint (no URL scheme)
      - access_key
      - secret_key
      - bucket_name
    type: "string"
    required: true
  name:
    type: "string"
    default: "default"
  dependency_path:
    type: "string"

outputs:
  cache_hit:
    value: ${{ steps.restore-go-caches.outputs.cache-hit }}

runs:
  using: "composite"
  steps:
    - name: "Retrieve go configuration"
      uses: "bckground/actions/cache-go/internal@main"
      id: "go-config"
      with:
        name: "${{ inputs.name }}"
        dependency_path: "${{ inputs.dependency_path }}"

    - name: "Clean cache directories"
      shell: "bash"
      run: |
        go clean -cache -modcache

    - id: "restore-go-caches"
      name: "Restore go caches"
      uses: "tespkg/actions-cache/restore@570a8ae32f67c95bcaca3f8cc88702cd318291e9" # v1.10.0
      with:
        endpoint: ${{ fromJson(inputs.s3_credentials).endpoint }}
        accessKey: ${{ fromJson(inputs.s3_credentials).access_key }}
        secretKey: ${{ fromJson(inputs.s3_credentials).secret_key }}
        bucket: ${{ fromJson(inputs.s3_credentials).bucket_name }}
        use-fallback: false
        key: "${{ steps.go-config.outputs.cache_key }}"
        restore-keys: |
          ${{ steps.go-config.outputs.cache_restore_key }}
        path: |
          ${{ steps.go-config.outputs.mod_cache }}
          ${{ steps.go-config.outputs.build_cache }}
