---
name: "cache-go - restore"
description: "Restores the Go module and build caches from the configured backend (s3 or github)."

inputs:
  cache-backend:
    description: |
      Which cache backend to use: "s3" or "github".

      Required. When set to "s3", s3-credentials is required.
    required: true
  s3-credentials:
    description: |
      The S3 credentials as a JSON object. Required when cache-backend is "s3".
      Must contain the following keys:

      - endpoint (no URL scheme)
      - access_key
      - secret_key
      - bucket_name
    default: ""
  name:
    default: "default"
  dependency-path:
    description: "Path to the dependency file to hash for the cache key (defaults to go.sum at the workspace root)"

outputs:
  cache-hit:
    description: |
      "true" only when the primary cache key was an exact match; "false" for a
      restore-key match or a total miss. See cache-match to tell those apart.
    # cache-hit is 'true' only on an exact primary-key match; every other case
    # (a restore-key match or a total miss) is non-'true', so '== true' coerces
    # it to a strict 'true'/'false' string (action outputs are always strings).
    # The parentheses are required: '==' binds tighter than '||', so without
    # them the comparison would only apply to the github output.
    value: ${{ (steps.restore-go-caches-s3.outputs.cache-hit || steps.restore-go-caches-github.outputs.cache-hit) == 'true' }}
  cache-match:
    description: |
      How the cache was matched: "exact" (primary key hit), "partial" (only a
      restore-key matched), or "none" (no match at all).
    # 'exact' when cache-hit is 'true'. Otherwise 'partial' if a cache was
    # restored at all and 'none' if not: cache-matched-key holds the restored
    # cache's key and is empty only on a total miss (documented for both
    # backends), so it splits 'partial' from 'none' without relying on whether
    # cache-hit is '' or 'false' on a miss. Exactly one backend step runs, so
    # each '||' selects the active backend's value.
    value: >-
      ${{ (steps.restore-go-caches-s3.outputs.cache-hit || steps.restore-go-caches-github.outputs.cache-hit) == 'true' && 'exact'
      || (steps.restore-go-caches-s3.outputs.cache-matched-key || steps.restore-go-caches-github.outputs.cache-matched-key) != '' && 'partial'
      || 'none' }}

runs:
  using: "composite"
  steps:
    - name: "Validate cache configuration"
      shell: "bash"
      env:
        CACHE_BACKEND: "${{ inputs.cache-backend }}"
        S3_CREDENTIALS: "${{ inputs.s3-credentials }}"
      run: |
        case "$CACHE_BACKEND" in
          s3)
            if [ -z "$S3_CREDENTIALS" ]; then
              echo "::error::cache-backend is 's3' but s3-credentials was not provided"
              exit 1
            fi
            ;;
          github) ;;
          *)
            echo "::error::invalid cache-backend '$CACHE_BACKEND' (expected: s3 or github)"
            exit 1
            ;;
        esac

    - name: "Resolve go cache configuration"
      id: "go-cache"
      shell: "bash"
      env:
        CACHE_NAME: "${{ inputs.name }}"
        DEP_HASH: "${{ hashFiles(inputs.dependency-path == '' && 'go.sum' || inputs.dependency-path) }}"
      run: |
        bash "${{ github.action_path }}/../internal/go-cache-config.sh"

    - name: "Clean cache directories"
      shell: "bash"
      run: |
        go clean -cache -modcache

    - id: "restore-go-caches-s3"
      name: "Restore go caches (S3)"
      if: "inputs.cache-backend == 's3'"
      uses: "tespkg/actions-cache/restore@570a8ae32f67c95bcaca3f8cc88702cd318291e9" # v1.10.0
      with:
        endpoint: ${{ fromJson(inputs.s3-credentials).endpoint }}
        accessKey: ${{ fromJson(inputs.s3-credentials).access_key }}
        secretKey: ${{ fromJson(inputs.s3-credentials).secret_key }}
        bucket: ${{ fromJson(inputs.s3-credentials).bucket_name }}
        use-fallback: false
        key: "${{ steps.go-cache.outputs.key }}"
        restore-keys: |
          ${{ steps.go-cache.outputs.restore-key }}
        path: |
          ${{ steps.go-cache.outputs.mod_cache }}
          ${{ steps.go-cache.outputs.build_cache }}

    - id: "restore-go-caches-github"
      name: "Restore go caches (GitHub)"
      if: "inputs.cache-backend == 'github'"
      uses: "actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8" # v6.0.0
      with:
        key: "${{ steps.go-cache.outputs.key }}"
        restore-keys: |
          ${{ steps.go-cache.outputs.restore-key }}
        path: |
          ${{ steps.go-cache.outputs.mod_cache }}
          ${{ steps.go-cache.outputs.build_cache }}
